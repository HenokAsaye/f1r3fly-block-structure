syntax = "proto3";

package block;

message BlockMessage {
  bytes block_hash = 1;
  BlockHeader header = 2;
  BlockBody body = 3;
  repeated Justification justifications = 4;
  bytes sender = 5;
  bytes sig = 6;
  string sig_algorithm = 7;
  string shard_id = 8;
  bytes extra_bytes = 9;
}

message BlockHeader {
  repeated bytes parents_hash_list = 1;
  bytes post_state_hash = 2;
  bytes bonds_map_hash = 3;
  bytes state_dag_hash = 4;
  int32 deploy_count = 5;
  int64 timestamp = 6;
  int64 version = 7;
  int64 seq_num = 8;
  string shard_id = 9;
}

message BlockBody {
  repeated ProcessedDeploy deploys = 1;
  repeated ProcessedSystemDeploy system_deploys = 2;
  repeated BondedValidatorInfo state_dag = 3;
}

message ProcessedDeploy {
  DeployData deploy = 1;
  PCost cost = 2;
  repeated Event deploy_log = 3;
  repeated Event payments_results = 4;
  bool is_failed = 5;
}

message PCost {
  int64 cost = 1;
}

message ProcessedSystemDeploy {
  SystemDeploy deploy = 1;
  PCost cost = 2;
  repeated Event event_log = 3;
  string error_msg = 4;
  bool has_error = 5;
}

message SystemDeploy {
  bytes data = 1;
  bytes sig = 2;
  string sig_algorithm = 3;
}

message DeployData {
  bytes deployer = 1;
  string term = 2;
  int64 timestamp = 3;
  bytes sig = 4;
  string sig_algorithm = 5;
  int64 phlo_price = 6;
  int64 phlo_limit = 7;
  int64 valid_after_block_number = 8;
  string shard_id = 9;
}

message Justification {
  bytes validator = 1;
  bytes latest_block_hash = 2;
}

message Bond {
  bytes validator = 1;
  int64 stake = 2;
}

message BondedValidatorInfo {
  bytes validator = 1;
  int64 free_stake = 2;
}

message Event {
  oneof event_type {
    ProduceEvent produce = 1;
    ConsumeEvent consume = 2;
    CommEvent comm = 3;
  }
}

message ProduceEvent {
  bytes channel_hash = 1;
  bytes data = 2;
  bool persistent = 3;
}

message ConsumeEvent {
  repeated bytes channel_hashes = 1;
  bytes continuation_hash = 2;
  bool persistent = 3;
}

message CommEvent {
  ConsumeEvent consume = 1;
  repeated ProduceEvent produces = 2;
}

message BondsMap {
  repeated Bond bonds = 1;
}
